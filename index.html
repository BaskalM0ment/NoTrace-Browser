<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoTrace Browser</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000000;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* TITLEBAR */
.titlebar {
  height: 32px;
  background: #000000;
  display: flex;
  align-items: center;
  padding-left: 10px;
  -webkit-app-region: drag;
  flex-shrink: 0;
  z-index: 9999;
}

.window-controls {
  display: flex;
  gap: 8px;
  -webkit-app-region: no-drag;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: bold;
  color: #000000;
  cursor: pointer;
}

.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }

button, input {
  -webkit-app-region: no-drag;
  border: none;
}

/* APP */
#app {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  position: relative;
}

/* TABS */
.tabs {
  display: none;
  gap: 6px;
  padding: 6px;
  background: #000000;
  flex-shrink: 0;
  align-items: center;
}

.tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  min-width: 32px;
  max-width: 220px;
  height: 32px;
  border-radius: 999px;
  background: #000000;
  color: #ffffff;
  font-size: 12px;
  cursor: pointer;
  overflow: hidden;
  user-select: none;
  box-sizing: border-box;
  box-shadow: 0 0 10px rgba(255,255,255,0.12);
}

.tab:hover {
  box-shadow: 0 0 14px rgba(255,255,255,0.22);
}

.tab.active {
  box-shadow: 0 0 16px rgba(255,255,255,0.30);
}

.tab .title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tab .close {
  flex-shrink: 0;
  font-size: 14px;
  cursor: pointer;
  color: #ffffff;
}

.tab img {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* NAV */
.top {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: #000000;
  flex-shrink: 0;
}

.top button {
  padding: 8px 12px;
  border-radius: 6px;
  background: #000000;
  color: #fff;
  cursor: pointer;
}

.top input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  background: #000000;
  color: #ffffff;
  outline: none;
  box-shadow: 0 0 10px rgba(255,255,255,0.18);
}

/* VIEW */
#view {
  position: absolute;
  top: 92px;
  left: 0;
  right: 0;
  bottom: 0;
  background: #000000;
  overflow: hidden;
}

webview {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: #000000;
}

webview.active {
  display: flex;
}

/* HOME */
#home {
  position: absolute;
  top: 92px;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000000;
  z-index: 5;
}

#home.hidden {
  display: none;
}

.center {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.center h2 {
  margin: 0 0 20px 0;
  color: #ffffff;
}

.search-row {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
}

.search-row input {
  width: 500px;
  padding: 14px 18px;
  border-radius: 999px;
  background: #000000;
  color: #ffffff;
  outline: none;
  text-align: left;
  box-shadow: 0 0 14px rgba(255,255,255,0.12);
}
</style>
</head>

<body>

<div class="titlebar">
  <div class="window-controls">
    <div class="dot red" onclick="closeApp()">✕</div>
    <div class="dot yellow" onclick="minimize()">—</div>
    <div class="dot green" onclick="maximize()">▢</div>
  </div>
</div>

<div id="app">

  <div class="tabs" id="tabs"></div>

  <div class="top">
    <button onclick="showHome()">🏠</button>
    <button onclick="back()">⬅</button>
    <button onclick="forward()">➡</button>
    <input id="url" placeholder="Search or enter URL">
  </div>

  <div id="view"></div>

  <div id="home">
    <div class="center">
      <h2>NoTrace Browser</h2>
      <div class="search-row">
        <input id="search" placeholder="Search or enter URL">
      </div>
    </div>
  </div>

</div>

<script>
let tabs = [];
let active = -1;

const tabsDiv = document.getElementById("tabs");
const viewDiv = document.getElementById("view");
const home = document.getElementById("home");
const urlBar = document.getElementById("url");
const searchBar = document.getElementById("search");

function formatURL(value) {
  if (!value) return "";

  value = value.trim();

  /* Already full URL */
  if (
    value.startsWith("http://") ||
    value.startsWith("https://")
  ) {
    return value;
  }

  /* Direct website detection */
  const websitePattern = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/;

  if (websitePattern.test(value)) {
    return "https://" + value;
  }

  /* Search query */
  return "https://duckduckgo.com/?q=" + encodeURIComponent(value);
}

function hideHome() {
  home.classList.add("hidden");
}

function showHome() {
  home.classList.remove("hidden");

  tabs.forEach(tab => {
    tab.view.classList.remove("active");
  });

  tabsDiv.style.display = tabs.length > 0 ? "flex" : "none";

  urlBar.value = "";
  searchBar.value = "";
}

function search() {
  const value = searchBar.value.trim();
  if (!value) return;

  const finalURL = formatURL(value);

  if (active !== -1 && tabs[active] && !tabs[active].loaded) {
    loadTab(active, finalURL);
  } else {
    createTab(finalURL);
  }
}

function loadTab(index, url) {
  const tab = tabs[index];
  if (!tab) return;

  tab.loading = true;
  tab.loaded = true;
  tab.title = "Loading...";
  tab.view.src = url;

  hideHome();

  tabs.forEach(t => t.view.classList.remove("active"));
  tab.view.classList.add("active");

  urlBar.value = url;

  renderTabs();
}

function createTab(url = "") {
  const webview = document.createElement("webview");
  viewDiv.appendChild(webview);

  const tabData = {
    view: webview,
    title: "New Tab",
    favicon: "",
    loaded: false,
    loading: false
  };

  tabs.push(tabData);
  const tabIndex = tabs.length - 1;

  webview.addEventListener("did-start-loading", () => {
    tabData.loading = true;
    if (webview.src) {
      tabData.title = "Loading...";
      tabData.loaded = true;
    }
    renderTabs();
  });

  webview.addEventListener("page-title-updated", e => {
    if (e.title && e.title.trim()) {
      tabData.title = e.title;
      renderTabs();
    }
  });

  webview.addEventListener("page-favicon-updated", e => {
    if (e.favicons && e.favicons.length > 0) {
      tabData.favicon = e.favicons[0];
      renderTabs();
    }
  });

  webview.addEventListener("did-stop-loading", () => {
    tabData.loading = false;
    tabData.loaded = !!webview.getURL();

    const title = webview.getTitle();
    if (title && title.trim()) {
      tabData.title = title;
    }

    if (active === tabs.indexOf(tabData)) {
      urlBar.value = webview.getURL();
    }

    renderTabs();
  });

  webview.addEventListener("did-finish-load", () => {
    tabData.loading = false;
    tabData.loaded = true;

    const title = webview.getTitle();
    if (title && title.trim()) {
      tabData.title = title;
    }

    renderTabs();
  });

  webview.addEventListener("did-navigate", e => {
    tabData.loaded = true;

    if (active === tabs.indexOf(tabData)) {
      urlBar.value = e.url;
    }

    renderTabs();
  });

  webview.addEventListener("did-navigate-in-page", e => {
    if (active === tabs.indexOf(tabData)) {
      urlBar.value = e.url;
    }
  });

  active = tabIndex;
  tabsDiv.style.display = "flex";

  if (url) {
    loadTab(active, url);
  } else {
    switchTab(active);
    showHome();
  }

  renderTabs();
}

function switchTab(index) {
  if (index < 0 || index >= tabs.length) return;

  active = index;

  tabs.forEach(tab => {
    tab.view.classList.remove("active");
  });

  const currentTab = tabs[index];

  if (!currentTab.loaded || !currentTab.view.src) {
    showHome();
  } else {
    hideHome();
    currentTab.view.classList.add("active");
    urlBar.value = currentTab.view.getURL() || currentTab.view.src;
  }

  renderTabs();
}

function closeTab(index) {
  if (index < 0 || index >= tabs.length) return;

  const closingActive = index === active;

  const tab = tabs[index];

  if (tab.view.parentNode) {
    tab.view.parentNode.removeChild(tab.view);
  }

  tabs.splice(index, 1);

  if (tabs.length === 0) {
    active = -1;
    renderTabs();
    showHome();
    return;
  }

  if (closingActive) {
    active = index >= tabs.length ? tabs.length - 1 : index;
  } else if (index < active) {
    active--;
  }

  switchTab(active);
}

function renderTabs() {
  tabsDiv.innerHTML = "";

  if (tabs.length === 0) {
    tabsDiv.style.display = "none";
    return;
  }

  tabsDiv.style.display = "flex";

  tabs.forEach((tab, index) => {
    const el = document.createElement("div");
    el.className = "tab" + (index === active ? " active" : "");

    const icon = document.createElement("img");
    icon.src = tab.favicon || "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16'><rect width='16' height='16' fill='white'/></svg>";

    const title = document.createElement("span");
    title.className = "title";
    title.textContent = tab.loading ? "Loading..." : (tab.title || "New Tab");

    const close = document.createElement("span");
    close.className = "close";
    close.textContent = "×";

    close.onclick = (e) => {
      e.stopPropagation();
      closeTab(index);
    };

    el.onclick = () => {
      switchTab(index);
    };

    el.appendChild(icon);
    el.appendChild(title);
    el.appendChild(close);

    tabsDiv.appendChild(el);
  });

  const add = document.createElement("div");
  add.className = "tab";
  add.innerHTML = '<span class="title">+</span>';

  add.onclick = (e) => {
    e.stopPropagation();
    createTab("");
  };

  tabsDiv.appendChild(add);
}

function back() {
  if (active !== -1 && tabs[active]) {
    tabs[active].view.goBack();
  }
}

function forward() {
  if (active !== -1 && tabs[active]) {
    tabs[active].view.goForward();
  }
}

searchBar.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    search();
  }
});

urlBar.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const value = urlBar.value.trim();
    if (!value) return;

    const finalURL = formatURL(value);

    if (active === -1 || !tabs[active]) {
      createTab(finalURL);
    } else {
      loadTab(active, finalURL);
    }
  }
});

const { ipcRenderer } = require("electron");

function minimize() {
  ipcRenderer.send("minimize");
}

function maximize() {
  ipcRenderer.send("maximize");
}

function closeApp() {
  ipcRenderer.send("close");
}

renderTabs();
showHome();
</script>

</body>
</html>
