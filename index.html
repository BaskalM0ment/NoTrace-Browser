<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoTrace Browser</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f10;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* TITLEBAR */
.titlebar {
  height: 32px;
  background: #111;
  display: flex;
  align-items: center;
  padding-left: 10px;
  -webkit-app-region: drag;
}

.window-controls {
  display: flex;
  gap: 8px;
  -webkit-app-region: no-drag;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: bold;
  color: #111;
  cursor: pointer;
}

.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }

button, input {
  -webkit-app-region: no-drag;
}

/* APP */
#app {
  display: flex;
  flex-direction: column;
  flex: 1;
}

/* TABS */
.tabs {
  display: none;
  gap: 6px;
  padding: 6px;
  background: #0f0f10;
  border-bottom: 1px solid #222;
}

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #1b1b1d;
  color: #ccc;
  font-size: 12px;
  cursor: pointer;
  max-width: 180px;
  overflow: hidden;
}

.tab:hover { background: #2a2a2f; color: #fff; }
.tab.active { background: #3a3a40; color: #fff; }

.tab .title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tab .close {
  flex-shrink: 0;
  cursor: pointer;
}

/* NAV */
.top {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: #1b1b1d;
}

.top button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #2b2b2f;
  color: #fff;
  cursor: pointer;
}

.top button:hover {
  background: #3a3a40;
}

.top input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

/* VIEW */
#view {
  position: relative;
  flex: 1;
}

webview {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: none;
}

webview.active {
  display: block;
}

/* HOME */
#home {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f0f10;
}

#home.hidden {
  display: none;
}

.center input {
  width: 400px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1b1b1d;
  color: white;
}

.center button {
  padding: 12px;
  margin-left: 10px;
  border-radius: 10px;
  border: none;
  background: #2b2b2f;
  color: white;
}
</style>
</head>

<body>

<div class="titlebar">
  <div class="window-controls">
    <div class="dot red" onclick="closeApp()">✕</div>
    <div class="dot yellow" onclick="minimize()">—</div>
    <div class="dot green" onclick="maximize()">▢</div>
  </div>
</div>

<div id="app">
  <div class="tabs" id="tabs"></div>

  <div class="top">
    <button onclick="showHome()">🏠</button>
    <button onclick="back()">⬅</button>
    <button onclick="forward()">➡</button>
    <input id="url">
  </div>

  <div id="view"></div>

  <div id="home">
    <div class="center">
      <h2>NoTrace Browser</h2>
      <input id="search" placeholder="Search or enter URL">
      <button onclick="search()">Go</button>
    </div>
  </div>
</div>

<script>
let tabs = [];
let active = -1;

const tabsDiv = document.getElementById("tabs");
const viewDiv = document.getElementById("view");
const home = document.getElementById("home");
const urlBar = document.getElementById("url");

/* SEARCH */
function search() {
  let v = document.getElementById("search").value.trim();
  if (!v) return;

  if (!v.startsWith("http")) {
    v = "https://duckduckgo.com/?q=" + encodeURIComponent(v);
  }

  createTab(v);
}

/* CREATE TAB */
function createTab(url = "") {
  const webview = document.createElement("webview");

  // ALWAYS attach webview
  viewDiv.appendChild(webview);

  // Set URL AFTER append
  if (url) {
    webview.src = url;
  }

  tabs.push({ view: webview, title: "New Tab" });
  active = tabs.length - 1;

  webview.addEventListener("page-title-updated", e => {
    tabs[active].title = e.title;
    renderTabs();
  });

  webview.addEventListener("did-navigate", e => {
    urlBar.value = e.url;
  });

  switchTab(active);
  renderTabs();
}

/* SWITCH */
function switchTab(i) {
  active = i;

  tabs.forEach((t, index) => {
    t.view.classList.remove("active");

    if (index === i) {
      if (t.view.src) {
        hideHome();
        t.view.classList.add("active");
      } else {
        showHome();
      }
    }
  });

  renderTabs();
}

/* CLOSE */
function closeTab(i) {
  viewDiv.removeChild(tabs[i].view);
  tabs.splice(i, 1);

  if (tabs.length === 0) {
    active = -1;
    showHome();
    renderTabs();
    return;
  }

  active = Math.max(0, i - 1);
  switchTab(active);
  renderTabs();
}

/* RENDER */
function renderTabs() {
  tabsDiv.innerHTML = "";

  // ONLY hide on first launch
  if (tabs.length === 0) {
    tabsDiv.style.display = "none";
    return;
  }

  // Always show after first tab exists
  tabsDiv.style.display = "flex";

  tabs.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = "tab " + (i === active ? "active" : "");

    const title = document.createElement("span");
    title.className = "title";
    title.textContent = t.title;

    const close = document.createElement("span");
    close.className = "close";
    close.textContent = "×";

    close.onclick = (e) => {
      e.stopPropagation();
      closeTab(i);
    };

    el.appendChild(title);
    el.appendChild(close);
    el.onclick = () => switchTab(i);

    tabsDiv.appendChild(el);
  });

  const add = document.createElement("div");
  add.className = "tab";
  add.textContent = "+";

add.onclick = () => {
  createTab("");   // ALWAYS creates a real tab
  showHome();      // just overlays home
};

  tabsDiv.appendChild(add);
}

/* NAV */
function back() {
  if (active !== -1) tabs[active].view.goBack();
}

function forward() {
  if (active !== -1) tabs[active].view.goForward();
}

/* HOME */
function showHome() {
  home.classList.remove("hidden");
}

function hideHome() {
  home.classList.add("hidden");
}

/* ENTER */
document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

urlBar.addEventListener("keydown", e => {
  if (e.key === "Enter" && active !== -1) {
    let v = urlBar.value;

    if (!v.startsWith("http")) {
      v = "https://duckduckgo.com/?q=" + encodeURIComponent(v);
    }

    tabs[active].view.src = v;
    hideHome();
    tabs[active].view.classList.add("active");
  }
});

/* WINDOW */
const { ipcRenderer } = require("electron");

function minimize() {
  ipcRenderer.send("minimize");
}
function maximize() {
  ipcRenderer.send("maximize");
}
function closeApp() {
  ipcRenderer.send("close");
}
</script>

</body>
</html>
