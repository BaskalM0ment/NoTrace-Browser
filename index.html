<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoTrace Browser</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000000;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* TITLEBAR */
.titlebar {
  height: 32px;
  background: #000000;
  display: flex;
  align-items: center;
  padding-left: 10px;
  -webkit-app-region: drag;
  flex-shrink: 0;
  z-index: 9999;
}

.window-controls {
  display: flex;
  gap: 8px;
  -webkit-app-region: no-drag;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: bold;
  color: #000000;
  cursor: pointer;
}

.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }

button, input {
  -webkit-app-region: no-drag;
  border: none;
}

/* APP */
#app {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  position: relative;
}

/* TABS */
.tabs {
  display: none;
  gap: 6px;
  padding: 6px;
  background: #000000;
  flex-shrink: 0;
  align-items: center;
}

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 999px;
  background: #000000;
  color: #ffffff;
  font-size: 12px;
  cursor: pointer;
  max-width: 180px;
  min-width: 32px;
  overflow: hidden;
  user-select: none;
  box-shadow: 0 0 8px rgba(255,255,255,0.18);
}

.tab:hover {
  background: #000000;
  color: #ffffff;
  box-shadow: 0 0 12px rgba(255,255,255,0.28);
}

.tab.active {
  background: #000000;
  color: #ffffff;
  box-shadow: 0 0 14px rgba(255,255,255,0.35);
}

.tab .title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tab .close {
  flex-shrink: 0;
  font-size: 14px;
  cursor: pointer;
  color: #ffffff;
}

/* NAV */
.top {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: #000000;
  flex-shrink: 0;
}

.top button {
  padding: 8px 12px;
  border-radius: 6px;
  background: #000000;
  color: #fff;
  cursor: pointer;
}

.top button:hover {
  background: #000000;
}

.top input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  background: #000000;
  color: #ffffff;
  outline: none;
  box-shadow: 0 0 10px rgba(255,255,255,0.18);
}

/* VIEW */
#view {
  position: relative;
  flex: 1;
  min-height: 0;
  background: #000000;
}

webview {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: #000000;
}

webview.active {
  display: block;
}

/* HOME */
#home {
  position: absolute;
  top: 92px;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000000;
  z-index: 5;
}

#home.hidden {
  display: none;
}

.center {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.center h2 {
  margin: 0 0 20px 0;
  color: #ffffff;
}

.search-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 12px;
}

.search-row input {
  width: 400px;
  padding: 12px;
  border-radius: 10px;
  background: #000000;
  color: #ffffff;
  outline: none;
  box-shadow: 0 0 12px rgba(255,255,255,0.18);
}

.search-row button {
  padding: 12px 20px;
  border-radius: 10px;
  background: #000000;
  color: #ffffff;
  cursor: pointer;
}

.search-row button:hover {
  background: #000000;
}
</style>
</head>

<body>

<div class="titlebar">
  <div class="window-controls">
    <div class="dot red" onclick="closeApp()">✕</div>
    <div class="dot yellow" onclick="minimize()">—</div>
    <div class="dot green" onclick="maximize()">▢</div>
  </div>
</div>

<div id="app">

  <div class="tabs" id="tabs"></div>

  <div class="top">
    <button onclick="showHome()">🏠</button>
    <button onclick="back()">⬅</button>
    <button onclick="forward()">➡</button>
    <input id="url" placeholder="Search or enter URL">
  </div>

  <div id="view"></div>

  <div id="home">
    <div class="center">
      <h2>NoTrace Browser</h2>

      <div class="search-row">
        <input id="search" placeholder="Search or enter URL">
        <button onclick="search()">Go</button>
      </div>
    </div>
  </div>

</div>

<script>
let tabs = [];
let active = -1;

const tabsDiv = document.getElementById("tabs");
const viewDiv = document.getElementById("view");
const home = document.getElementById("home");
const urlBar = document.getElementById("url");
const searchBar = document.getElementById("search");

/* URL FORMAT */
function formatURL(value) {
  if (!value.startsWith("http://") && !value.startsWith("https://")) {
    return "https://duckduckgo.com/?q=" + encodeURIComponent(value);
  }
  return value;
}

/* HOME */
function showHome() {
  home.classList.remove("hidden");

  tabs.forEach(tab => {
    tab.view.classList.remove("active");
  });

  tabsDiv.style.display = tabs.length > 0 ? "flex" : "none";

  urlBar.value = "";
}

function hideHome() {
  home.classList.add("hidden");
}

/* SEARCH */
function search() {
  let value = searchBar.value.trim();
  if (!value) return;

  value = formatURL(value);

  if (active !== -1 && tabs[active] && !tabs[active].view.src) {
    tabs[active].view.src = value;
    tabs[active].title = "Loading...";
    hideHome();
    tabs[active].view.classList.add("active");
    urlBar.value = value;
    renderTabs();
    return;
  }

  createTab(value);
}

/* CREATE TAB */
function createTab(url = "") {
  const webview = document.createElement("webview");

  viewDiv.appendChild(webview);

  const tabData = {
    view: webview,
    title: "New Tab"
  };

  tabs.push(tabData);
  tabsDiv.style.display = "flex";
  active = tabs.length - 1;

  webview.addEventListener("page-title-updated", e => {
    const index = tabs.findIndex(tab => tab.view === webview);

    if (index !== -1) {
      tabs[index].title = e.title || "New Tab";
      renderTabs();
    }
  });

  webview.addEventListener("did-navigate", e => {
    const index = tabs.findIndex(tab => tab.view === webview);

    if (index !== -1) {
      tabs[index].title = webview.getTitle() || "New Tab";
    }

    if (index === active) {
      urlBar.value = e.url;
    }

    renderTabs();
  });

  if (url) {
    webview.src = url;
    hideHome();
  } else {
    showHome();
  }

  switchTab(active);
  renderTabs();
}

/* SWITCH TAB */
function switchTab(index) {
  if (index < 0 || index >= tabs.length) return;

  active = index;

  tabs.forEach(tab => {
    tab.view.classList.remove("active");
  });

  const currentTab = tabs[index];

  if (!currentTab.view.src) {
    showHome();
    urlBar.value = "";
  } else {
    hideHome();
    currentTab.view.classList.add("active");
    urlBar.value = currentTab.view.src;
  }

  renderTabs();
}

/* CLOSE TAB */
function closeTab(index) {
  if (index < 0 || index >= tabs.length) return;

  const wasActive = index === active;

  viewDiv.removeChild(tabs[index].view);
  tabs.splice(index, 1);

  if (tabs.length === 0) {
    active = -1;
    showHome();
    renderTabs();
    return;
  }

  if (wasActive) {
    switchTab(index < tabs.length ? index : tabs.length - 1);
  } else {
    if (index < active) active--;
    renderTabs();
  }
}

/* RENDER TABS */
function renderTabs() {
  tabsDiv.innerHTML = "";

  if (tabs.length === 0) {
    tabsDiv.style.display = "none";
    return;
  }

  tabsDiv.style.display = "flex";

  tabs.forEach((tab, index) => {
    const el = document.createElement("div");
    el.className = "tab" + (index === active ? " active" : "");

    const title = document.createElement("span");
    title.className = "title";
    title.textContent = tab.title || "New Tab";

    const close = document.createElement("span");
    close.className = "close";
    close.textContent = "×";

    close.onclick = (e) => {
      e.stopPropagation();
      closeTab(index);
    };

    el.appendChild(title);
    el.appendChild(close);

    el.onclick = () => {
      switchTab(index);
    };

    tabsDiv.appendChild(el);
  });

  const add = document.createElement("div");
  add.className = "tab";
  add.innerHTML = '<span class="title">+</span>';

  add.onclick = () => {
    createTab("");
    active = tabs.length - 1;
    renderTabs();
    showHome();
  };

  tabsDiv.appendChild(add);
}

/* NAV */
function back() {
  if (active !== -1 && tabs[active]) {
    tabs[active].view.goBack();
  }
}

function forward() {
  if (active !== -1 && tabs[active]) {
    tabs[active].view.goForward();
  }
}

/* EVENTS */
searchBar.addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

urlBar.addEventListener("keydown", e => {
  if (e.key === "Enter" && active !== -1 && tabs[active]) {
    const value = formatURL(urlBar.value.trim());

    tabs[active].view.src = value;
    tabs[active].title = "Loading...";
    hideHome();
    tabs[active].view.classList.add("active");

    renderTabs();
  }
});

/* WINDOW */
const { ipcRenderer } = require("electron");

function minimize() {
  ipcRenderer.send("minimize");
}

function maximize() {
  ipcRenderer.send("maximize");
}

function closeApp() {
  ipcRenderer.send("close");
}

/* FIRST LOAD */
renderTabs();
showHome();
</script>

</body>
</html>
