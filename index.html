<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoTrace Browser</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f10;
  color: #fff;
}

/* CENTER PAGE */
#start {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.center {
  text-align: center;
}

.center input {
  width: 400px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1b1b1d;
  color: white;
}

.center button {
  padding: 12px;
  margin-left: 10px;
  border-radius: 10px;
  border: none;
  background: #2b2b2f;
  color: white;
  cursor: pointer;
}

/* BROWSER */
#browser {
  display: none;
  height: 100vh;
  flex-direction: column;
}

.top {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: #1b1b1d;
}

.top input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

.top button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #2b2b2f;
  color: white;
}

webview {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<!-- START PAGE -->
<div id="start">
  <div class="center">
    <h2>NoTrace Browser</h2>
    <input id="search" placeholder="Search or enter URL">
    <button onclick="search()">Go</button>
  </div>
</div>

<!-- BROWSER -->
<div id="browser">
  <div class="top">
    <button onclick="back()">⬅</button>
    <button onclick="forward()">➡</button>
    <input id="url">
  </div>

  <webview id="view"></webview>
</div>

<script>
const start = document.getElementById("start");
const browser = document.getElementById("browser");
const view = document.getElementById("view");
const urlBar = document.getElementById("url");

/* SEARCH */
function search() {
  let v = document.getElementById("search").value.trim();
  if (!v) return;

  if (!v.startsWith("http")) {
    v = "https://duckduckgo.com/?q=" + encodeURIComponent(v);
  }

  start.style.display = "none";
  browser.style.display = "flex";

  view.src = v;
  urlBar.value = v;
}

/* ENTER KEY */
document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

/* NAVIGATION */
function back() {
  view.goBack();
}

function forward() {
  view.goForward();
}

/* UPDATE URL */
view.addEventListener("did-navigate", (e) => {
  urlBar.value = e.url;
});
</script>

</body>
</html>
