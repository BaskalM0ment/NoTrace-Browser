<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoTrace Browser</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000000;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* TITLEBAR */
.titlebar {
  height: 32px;
  background: #000000;
  display: flex;
  align-items: center;
  padding-left: 10px;
  -webkit-app-region: drag;
  flex-shrink: 0;
  z-index: 9999;
}

.window-controls {
  display: flex;
  gap: 8px;
  -webkit-app-region: no-drag;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: bold;
  color: #000000;
  cursor: pointer;
}

.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }

button, input {
  -webkit-app-region: no-drag;
  border: none;
}

/* APP */
#app {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  position: relative;
}

/* TABS */
.tabs {
  display: none;
  gap: 6px;
  padding: 6px;
  background: #000000;
  flex-shrink: 0;
  align-items: center;
}

.tab {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 5px 12px;
  min-width: 32px;
  max-width: 180px;
  height: 32px;

  border: none;
  border-radius: 999px;

  background: #000000;
  color: #ffffff;

  font-size: 12px;
  cursor: pointer;
  overflow: hidden;
  user-select: none;

  box-sizing: border-box;
  box-shadow: 0 0 10px rgba(255,255,255,0.12);
}

.tab:hover {
  background: #000000;
  color: #ffffff;
  box-shadow: 0 0 14px rgba(255,255,255,0.22);
}

.tab.active {
  background: #000000;
  color: #ffffff;
  box-shadow: 0 0 16px rgba(255,255,255,0.28);
}

.tab .title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tab .close {
  flex-shrink: 0;
  font-size: 14px;
  cursor: pointer;
  color: #ffffff;
}

/* NAV */
.top {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: #000000;
  flex-shrink: 0;
}

.top button {
  padding: 8px 12px;
  border-radius: 6px;
  background: #000000;
  color: #fff;
  cursor: pointer;
}

.top button:hover {
  background: #000000;
}

.top input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  background: #000000;
  color: #ffffff;
  outline: none;
  box-shadow: 0 0 10px rgba(255,255,255,0.18);
}

/* VIEW */
#view {
  position: absolute;
  top: 92px;
  left: 0;
  right: 0;
  bottom: 0;
  background: #000000;
  overflow: hidden;
}

webview {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: #000000;
}

webview.active {
  display: flex;
}

/* HOME */
#home {
  position: absolute;
  top: 92px;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000000;
  z-index: 5;
}

#home.hidden {
  display: none;
}

.center {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.center h2 {
  margin: 0 0 20px 0;
  color: #ffffff;
}

.search-row {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
}

.search-row input {
  width: 500px;
  padding: 14px 18px;
  border-radius: 999px;
  border: none;
  background: #000000;
  color: #ffffff;
  outline: none;
  text-align: left;
  box-shadow: 0 0 14px rgba(255,255,255,0.12);
}

.search-row button {
  padding: 12px 20px;
  border-radius: 10px;
  background: #000000;
  color: #ffffff;
  cursor: pointer;
}

.search-row button:hover {
  background: #000000;
}
</style>
</head>

<body>

<div class="titlebar">
  <div class="window-controls">
    <div class="dot red" onclick="closeApp()">✕</div>
    <div class="dot yellow" onclick="minimize()">—</div>
    <div class="dot green" onclick="maximize()">▢</div>
  </div>
</div>

<div id="app">

  <div class="tabs" id="tabs"></div>

  <div class="top">
    <button onclick="showHome()">🏠</button>
    <button onclick="back()">⬅</button>
    <button onclick="forward()">➡</button>
    <input id="url" placeholder="Search or enter URL">
  </div>

  <div id="view"></div>

  <div id="home">
  <div class="center">
    <h2>NoTrace Browser</h2>

    <div class="search-row">
      <input id="search" placeholder="Search or enter URL">
    </div>

  </div>
</div>

<script>
let tabs = [];
let active = -1;

const tabsDiv = document.getElementById("tabs");
const viewDiv = document.getElementById("view");
const home = document.getElementById("home");
const urlBar = document.getElementById("url");
const searchBar = document.getElementById("search");

function formatURL(value) {
  if (!value) return "";

  if (
    value.startsWith("http://") ||
    value.startsWith("https://")
  ) {
    return value;
  }

  return "https://duckduckgo.com/?q=" + encodeURIComponent(value);
}

/* HOME */
function showHome() {
  home.classList.remove("hidden");

  tabs.forEach(tab => {
    tab.view.classList.remove("active");
  });

  /* Keep tabs visible if ANY tab exists */
  if (tabs.length > 0) {
    tabsDiv.style.display = "flex";
  } else {
    tabsDiv.style.display = "none";
  }

  /* Clear BOTH search fields on every new blank tab */
  urlBar.value = "";
  searchBar.value = "";
}

/* SEARCH */
function search() {
  let value = searchBar.value.trim();
  if (!value) return;

  const finalURL = formatURL(value);

  /* If current tab is blank, use it */
  if (active !== -1 && tabs[active]) {
    tabs[active].view.src = finalURL;
    tabs[active].title = value;
    tabs[active].loaded = true;

    hideHome();

    tabs.forEach(tab => {
      tab.view.classList.remove("active");
    });

    tabs[active].view.classList.add("active");

    urlBar.value = finalURL;

    renderTabs();
    return;
  }

  createTab(finalURL);
}

function createTab(url = "") {
  const webview = document.createElement("webview");

  webview.style.position = "absolute";
  webview.style.top = "0";
  webview.style.left = "0";
  webview.style.width = "100%";
  webview.style.height = "100%";

  viewDiv.appendChild(webview);

  const tabData = {
    view: webview,
    title: "New Tab",
    loaded: false
  };

  tabs.push(tabData);
  active = tabs.length - 1;

  webview.addEventListener("page-title-updated", e => {
    const index = tabs.findIndex(tab => tab.view === webview);

    if (index !== -1) {
      tabs[index].title = e.title || "New Tab";
      renderTabs();
    }
  });

  webview.addEventListener("did-navigate", e => {
    const index = tabs.findIndex(tab => tab.view === webview);

    if (index !== -1) {
      tabs[index].loaded = true;
      tabs[index].title = webview.getTitle() || "New Tab";
    }

    if (index === active) {
      urlBar.value = e.url;
    }

    renderTabs();
  });

  tabsDiv.style.display = "flex";

  if (url) {
    webview.src = url;
    tabData.loaded = true;
    hideHome();
  } else {
    showHome();
    searchBar.value = "";
  }

  switchTab(active);
  renderTabs();
}

function switchTab(index) {
  if (index < 0 || index >= tabs.length) return;

  active = index;

  tabs.forEach(tab => {
    tab.view.classList.remove("active");
  });

  const currentTab = tabs[index];

  if (!currentTab.loaded || !currentTab.view.src) {
    showHome();
    searchBar.value = "";
    urlBar.value = "";
  } else {
    hideHome();
    currentTab.view.classList.add("active");
    urlBar.value = currentTab.view.src;
  }

  renderTabs();
}

/* CLOSE TAB */
function closeTab(index) {
  if (index < 0 || index >= tabs.length) return;

  const closingActive = index === active;

  if (tabs[index].view && tabs[index].view.parentNode) {
    tabs[index].view.parentNode.removeChild(tabs[index].view);
  }

  tabs.splice(index, 1);

  /* No tabs left */
  if (tabs.length === 0) {
    active = -1;
    renderTabs();
    showHome();
    return;
  }

  /* Fix active index */
  if (closingActive) {
    if (index >= tabs.length) {
      active = tabs.length - 1;
    } else {
      active = index;
    }
  } else if (index < active) {
    active--;
  }

  switchTab(active);
  renderTabs();
}

/* RENDER TABS */
function renderTabs() {
  tabsDiv.innerHTML = "";

  if (tabs.length === 0) {
    tabsDiv.style.display = "none";
    showHome();
    return;
  }

  tabsDiv.style.display = "flex";

  tabs.forEach((tab, index) => {
    const el = document.createElement("div");
    el.className = "tab" + (index === active ? " active" : "");

    const title = document.createElement("span");
    title.className = "title";
    title.textContent = tab.title || "New Tab";

    const close = document.createElement("span");
    close.className = "close";
    close.textContent = "×";

    close.onclick = (e) => {
      e.stopPropagation();
      closeTab(index);
    };

    el.onclick = () => {
      switchTab(index);
    };

    el.appendChild(title);
    el.appendChild(close);

    tabsDiv.appendChild(el);
  });

  /* NEW TAB BUTTON */
  const add = document.createElement("div");
  add.className = "tab";
  add.innerHTML = '<span class="title">+</span>';

  add.onclick = (e) => {
    e.stopPropagation();
    createTab("");
  };

  tabsDiv.appendChild(add);
}

/* NAV */
function back() {
  if (active !== -1 && tabs[active]) {
    tabs[active].view.goBack();
  }
}

function forward() {
  if (active !== -1 && tabs[active]) {
    tabs[active].view.goForward();
  }
}

/* EVENTS */
searchBar.addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

urlBar.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    let value = urlBar.value.trim();
    if (!value) return;

    value = formatURL(value);

    /* If no active tab, create one */
    if (active === -1 || !tabs[active]) {
      createTab(value);
      return;
    }

    tabs[active].view.src = value;
    tabs[active].title = "Loading...";
    hideHome();
    tabs[active].view.classList.add("active");

    renderTabs();
  }
});

/* WINDOW */
const { ipcRenderer } = require("electron");

function minimize() {
  ipcRenderer.send("minimize");
}

function maximize() {
  ipcRenderer.send("maximize");
}

function closeApp() {
  ipcRenderer.send("close");
}

/* FIRST LOAD */
renderTabs();
showHome();
</script>

</body>
</html>
