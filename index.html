<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoTrace Browser</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f10;
  color: white;
}

#start {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.center {
  text-align: center;
}

.center input {
  width: 400px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1b1b1d;
  color: white;
}

.center button {
  padding: 12px;
  margin-left: 10px;
  border-radius: 10px;
  border: none;
  background: #2b2b2f;
  color: white;
}

#browser {
  height: calc(100vh - 30px);
}

#start {
  height: calc(100vh - 30px);
}

.tabs {
  display: flex;
  background: #111;
  padding: 6px;
  gap: 6px;
}

.tab {
  background: #2a2a2f;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
}

.tab span:last-child {
  margin-left: 6px;
  font-size: 12px;
}

.tabs .tab:last-child {
  padding: 4px 10px;
  font-size: 14px;
}

.tab.active {
  background: #3a3a40;
}

.top {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: #1b1b1d;
}

.top button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #2b2b2f;
  color: white;
  cursor: pointer;
}

.top button:hover {
  background: #3a3a40;
}

.top input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}
button, input {
  -webkit-app-region: no-drag;
}

webview {
  width: 100%;
  height: 100%;
  display: none;
}

webview.active {
  display: flex;
}

.window-controls {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 8px;
  z-index: 1000;

  -webkit-app-region: no-drag;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  cursor: pointer;
}

.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }
.window-controls button {
  background: #2b2b2f;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}
.titlebar {
  height: 30px;
  background: #111;
  display: flex;
  align-items: center;
  padding-left: 10px;

  -webkit-app-region: drag;
}

.window-controls {
  display: flex;
  gap: 8px;

  -webkit-app-region: no-drag;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  cursor: pointer;
}

.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }

/* keep buttons clickable */
button, input {
  -webkit-app-region: no-drag;
}
</style>
</head>

<body>

<div class="titlebar">
  <div class="window-controls">
    <div class="dot red" onclick="closeApp()"></div>
    <div class="dot yellow" onclick="minimize()"></div>
    <div class="dot green" onclick="maximize()"></div>
  </div>
</div>

<!-- START -->
<div id="start">
  <div class="center">
    <h2>NoTrace Browser</h2>
    <input id="search" placeholder="Search or enter URL">
    <button onclick="search()">Go</button>
  </div>
</div>

<!-- BROWSER -->
<div id="browser">
  <div class="tabs" id="tabs"></div>

  <div class="top">
    <button onclick="goHome()">🏠</button>
    <button onclick="back()">⬅</button>
    <button onclick="forward()">➡</button>
    <input id="url">
  </div>

  <div id="views"></div>
</div>

<script>
let tabs = [];
let active = -1;

const start = document.getElementById("start");
const browser = document.getElementById("browser");
const tabsDiv = document.getElementById("tabs");
const viewsDiv = document.getElementById("views");
const urlBar = document.getElementById("url");

/* SEARCH */
function search() {
  let v = document.getElementById("search").value.trim();
  if (!v) return;

  if (!v.startsWith("http")) {
    v = "https://duckduckgo.com/?q=" + encodeURIComponent(v);
  }

  start.style.display = "none";
  browser.style.display = "flex";

  createTab(v);
}

/* CREATE TAB */
function createTab(url = "") {
  const webview = document.createElement("webview");

  if (url) webview.src = url;

  viewsDiv.appendChild(webview);

  tabs.push({
    view: webview,
    title: "New Tab"
  });

  active = tabs.length - 1;

  webview.addEventListener("page-title-updated", e => {
    tabs[active].title = e.title;
    renderTabs();
  });

  webview.addEventListener("did-navigate", e => {
    urlBar.value = e.url;
  });

  switchTab(active);
  renderTabs();
}

/* SWITCH TAB */
function switchTab(i) {
  active = i;

  tabs.forEach((t, index) => {
    t.view.classList.remove("active");

    if (index === i) {
      t.view.classList.add("active");

      browser.style.display = "flex";
      start.style.display = "none";

      if (t.view.src) {
        urlBar.value = t.view.src;
      }
    }
  });

  renderTabs();
}
/* CLOSE TAB */
function closeTab(i) {
  viewsDiv.removeChild(tabs[i].view);
  tabs.splice(i, 1);

  if (tabs.length === 0) {
    active = -1;
    browser.style.display = "none";
    start.style.display = "flex";
    return;
  }

  active = Math.min(i, tabs.length - 1);
  switchTab(active);
}
/* RENDER */
function renderTabs() {
  tabsDiv.innerHTML = "";

  tabs.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = "tab " + (i === active ? "active" : "");

    const title = document.createElement("span");
    title.textContent = t.title;

    const close = document.createElement("span");
    close.textContent = " ✕";

    close.onclick = (e) => {
      e.stopPropagation();
      closeTab(i);
    };

    el.appendChild(title);
    el.appendChild(close);
    el.onclick = () => switchTab(i);

    tabsDiv.appendChild(el);
  });

  const add = document.createElement("div");
  add.className = "tab";
  add.textContent = "+";
  add.onclick = () => newTab();

  tabsDiv.appendChild(add);
}

/* NAV */
function back() {
  if (active !== -1) tabs[active].view.goBack();
}

function forward() {
  if (active !== -1) tabs[active].view.goForward();
}

function goHome() {
  browser.style.display = "none";
  start.style.display = "flex";
}

function newTab() {
  createTab("");
}

/* ENTER */
document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

urlBar.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    let v = urlBar.value;

    if (!v.startsWith("http")) {
      v = "https://duckduckgo.com/?q=" + encodeURIComponent(v);
    }

    tabs[active].view.src = v;
  }
});

/* WINDOW CONTROLS */
const { ipcRenderer } = require("electron");

function minimize() {
  ipcRenderer.send("minimize");
}

function maximize() {
  ipcRenderer.send("maximize");
}

function closeApp() {
  ipcRenderer.send("close");
}
</script>

</body>
</html>
